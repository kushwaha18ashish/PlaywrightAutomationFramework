name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

jobs:
  test:
    name: Run Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Using a stable LTS version
        cache: 'npm'       # Speeds up workflow execution by caching dependencies

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always() # Ensure report is uploaded even if tests fail
      with:
        name: playwright-report
        path: reports/
        retention-days: 30

    - name: Upload Test Results (Traces, Videos, Screenshots)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30
